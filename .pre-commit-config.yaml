repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.0
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

# ty is NOT in pre-commit — it runs non-blocking (warn-only) in CI.
# To check manually: uv run ty check
# To graduate to blocking when ty stabilizes: add exit-zero: false to CI step.
